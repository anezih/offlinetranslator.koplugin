name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev pkg-config curl unzip zip
      - name: Build Linux plugin
        run: sh ./native/build-linux.sh
      - name: Package artifact
        run: |
          mkdir -p dist
          cd build/linux-x86_64
          zip -r ../../dist/offlinetranslator-linux-x86_64.zip offlinetranslator.koplugin
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/offlinetranslator-linux-x86_64.zip

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev pkg-config curl unzip zip
      - name: Build Android plugins
        run: ANDROID_NDK_HOME="$ANDROID_NDK_ROOT" sh ./native/build-android.sh
      - name: Package artifacts
        run: |
          mkdir -p dist
          cd build/android-arm64-v8a
          zip -r ../../dist/offlinetranslator-android-arm64-v8a.zip offlinetranslator.koplugin
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/offlinetranslator-android-arm64-v8a.zip
